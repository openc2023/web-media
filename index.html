<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山海 - 新媒体艺术交互项目</title>
  <link rel="icon" href="https://img.7studio.org/logo/7logo.svg" type="image/svg+xml" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
    
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.6;
      color: #ccc;
    }
    
    .btn {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      color: #fff;
      padding: 15px 30px;
      font-size: 1.2rem;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      cursor: pointer;
      margin-top: 20px;
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
    }
    
    footer {
      margin-top: 50px;
      color: #666;
      font-size: 0.9rem;
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
      
      .btn {
        padding: 12px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="margin-bottom: 20px;"><img src="https://img.hrt7.org/logo/7logo.svg" alt="7logo" style="max-width: 100px; height: auto;"></div>
    <h1>山海</h1>
    <p>苍山如海</p>
    
    <a href="shanhai\shanhai.html" class="btn">进入项目</a>
    
    <footer>
      <p>山海 - by TianHan © 2025</p>
    </footer>
  </div>
</body>
</html>
