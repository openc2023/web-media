<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山海</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="wrap">
        <div class="hud" style="display: none;">
            <div><b>SPACE</b> 暂停/继续 · <b>R</b> 重置全部 · <b>T</b> 残影 · 点击=重置</div>
            <div>线条=<span id="lc"></span>（目标 2–5） · 峰数=3–6 · 速度≈<span id="sp"></span>px/s · 拉直=<span id="tp"></span> · 拖尾=<span id="tl"></span>px</div>
        </div>

        <audio id="audio" loop>
            <source src="shanhai.mp3" type="audio/mpeg">
            您的浏览器不支持音频元素。
        </audio>
        <canvas id="c"></canvas>
        
        <!-- 底部半透明圆角磨砂框 -->
        <div class="glass-panel">
            <div class="glass-content">
                ShanHai
                <canvas id="miniVisualizer" class="mini-visualizer"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
