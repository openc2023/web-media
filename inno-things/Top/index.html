<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Recognition Entry</title>
    <meta name="description" content="进入页面后先查看画作与简要提示，点击开始识别后启动手机摄像头。">
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="../index.html">Inno Things</a>
        <span class="status-tag">Recognition Entry</span>
    </header>

    <main>
        <section class="entry section">
            <div class="section-inner entry-layout">
                <section class="intro-panel surface-panel">
                    <p class="eyebrow">TOP</p>
                    <h1>先看画作，再开始识别。</h1>
                    <p class="lead">
                        把手机对准画面，点击开始识别后会调用摄像头。识别成功后，后面的 3D 内容就接在这个入口后面。
                    </p>

                    <div class="hero-actions">
                        <button class="button button-primary" id="start-recognition" type="button">开始识别</button>
                    </div>

                    <div class="entry-note">
                        <p class="entry-note-title">识别前提示</p>
                        <ul class="entry-note-list">
                            <li>尽量让整幅画作完整进入镜头</li>
                            <li>保持手机稳定，避免快速晃动</li>
                            <li>优先在手机浏览器的 HTTPS 页面里测试</li>
                        </ul>
                    </div>

                    <p class="camera-status" id="camera-status">待机中，点击按钮后启动摄像头。</p>
                </section>

                <figure class="artwork-panel">
                    <img src="./assets/images/000-top.png" alt="TOP 画作预览">
                    <figcaption>当前识别画作</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <section class="camera-modal" id="camera-modal" hidden>
        <div class="camera-shell">
            <button class="camera-close" id="close-camera" type="button" aria-label="关闭识别">关闭</button>
            <div class="camera-copy">
                <p class="eyebrow">MindAR Recognition</p>
                <h2 id="camera-title">准备启动识别。</h2>
                <p id="camera-overlay-status">正在启动摄像头...</p>
            </div>
            <div class="camera-stage">
                <div id="ar-container"></div>
                <div class="camera-target-frame" aria-hidden="true"></div>
            </div>
        </div>
    </section>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
            }
        }
    </script>
    <script type="module" src="./scripts/main.js"></script>
</body>
</html>
